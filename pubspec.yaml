name: artists_cottage
description: "Artist's Cottage App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  app_links: ^6.3.2
  flutter_local_notifications: ^18.0.1
  supabase_flutter: ^2.8.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.5
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/App_Icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/App_Icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/App_Icon.png"
